name = "cron-send-request"
main = "src/index.js"
compatibility_date = "2024-01-01"

[triggers]
crons = ["0 22 * * *"]  # 每天早上6点执行（UTC时间需要-8,目标[中国]时间为6点，UTC时间为22点）

# D1 数据库绑定（在 Cloudflare Dashboard 创建后填入 database_id）
[[d1_databases]]
binding = "DB"
database_name = "cron_db"
database_id = "3313d853-0aef-48b0-b7a9-6fb6fc5a5048"

# KV 命名空间绑定（在 Cloudflare Dashboard 创建后填入 id）
[[kv_namespaces]]
binding = "KV"
id = "4f5ab7db7ea14d5bb5f7165d25d90ce3"

# 可选变量（也可在 Dashboard 设置）
[vars]
# 初始超管账号：首次访问 /api/auth/bootstrap 时用于创建 admin
# ADMIN_BOOTSTRAP_TOKEN = "your-secret-bootstrap-token"

# 存储驱动选择：d1（默认）| mysql（预留）
STORAGE_DRIVER = "d1"

# 环境变量示例（旧版全局监控，已由数据库管理取代，保留兼容说明）
# ACCESS_URL1 = "https://example1.com"
